<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Promptly</title>
  <style>
    :root {
      --bg: #111;
      --surface: #1c1c1c;
      --surface2: #161616;
      --border: #2a2a2a;
      --accent: #0e8a77;
      --accent-hover: #13a891;
      --text: #e0e0e0;
      --text-muted: #555;
      --input-bg: #252525;
      --gutter-bg: #0d0d0d;
      --icon-btn: #2a2a2a;
    }
    [data-theme="light"] {
      --bg: #f2f2f2;
      --surface: #ffffff;
      --surface2: #ececec;
      --border: #d6d6d6;
      --text: #111;
      --text-muted: #aaa;
      --input-bg: #fff;
      --gutter-bg: #ddd;
      --icon-btn: #e4e4e4;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .toolbar-brand {
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.5px;
      color: var(--accent);
      white-space: nowrap;
    }
    .toolbar textarea {
      flex: 1;
      resize: none;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      font-family: inherit;
      font-size: 13px;
      height: 36px;
      line-height: 22px;
      transition: border-color 0.2s;
    }
    .toolbar textarea:focus { outline: none; border-color: var(--accent); }
    .toolbar button {
      height: 36px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #sendBtn {
      background: var(--accent);
      color: #fff;
      padding: 0 18px;
    }
    #sendBtn:hover { background: var(--accent-hover); }
    #themeBtn {
      background: var(--icon-btn);
      color: var(--text);
      padding: 0 10px;
      font-size: 15px;
    }
    #themeBtn:hover { background: var(--border); }

    /* ── Image Tray ── */
    .tray {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 66px;
      overflow-x: auto;
    }
    .tray-dropzone {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 14px;
      height: 50px;
      border: 1.5px dashed var(--text-muted);
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 12px;
      white-space: nowrap;
      flex-shrink: 0;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      user-select: none;
    }
    .tray-dropzone:hover, .tray-dropzone.drag-over {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(14, 138, 119, 0.06);
    }
    .tray-sep {
      width: 1px;
      height: 38px;
      background: var(--border);
      flex-shrink: 0;
    }
    .tray-thumb {
      position: relative;
      width: 50px;
      height: 50px;
      border-radius: 7px;
      overflow: hidden;
      border: 1.5px solid var(--border);
      flex-shrink: 0;
      cursor: grab;
      user-select: none;
      transition: border-color 0.15s;
    }
    .tray-thumb:hover { border-color: var(--accent); }
    .tray-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      pointer-events: none;
    }
    .tray-thumb .remove {
      position: absolute;
      top: 2px; right: 2px;
      background: rgba(0,0,0,0.65);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 15px; height: 15px;
      font-size: 9px;
      line-height: 15px;
      text-align: center;
      cursor: pointer;
      padding: 0;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .tray-thumb:hover .remove { opacity: 1; }

    /* ── Workspace ── */
    .workspace {
      display: flex;
      flex: 1;
      min-height: 0;
    }
    .wrapper-v {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    /* ── Panel (no header, just a colored 2px top line) ── */
    .pane {
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .pane::before {
      content: '';
      height: 2px;
      flex-shrink: 0;
      background: var(--panel-color, var(--accent));
    }
    #pane-chatgpt   { --panel-color: #10a37f; }
    #pane-claude    { --panel-color: #d4845a; }
    #pane-gemini    { --panel-color: #4285f4; }
    #pane-perplexity { --panel-color: #20b2aa; }

    /* Panel label — tiny floating badge, visible on hover */
    .pane-label {
      position: absolute;
      top: 6px;
      left: 8px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.4px;
      color: var(--panel-color, var(--accent));
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 5;
      text-transform: uppercase;
      background: var(--surface);
      padding: 1px 5px;
      border-radius: 4px;
    }
    .pane:hover .pane-label { opacity: 0.85; }

    /* Expand button */
    .pane-actions {
      position: absolute;
      top: 6px; right: 8px;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
      display: flex;
      gap: 4px;
    }
    .pane:hover .pane-actions { opacity: 1; }
    .pane.expanded .pane-actions { opacity: 1; }
    .pane-btn {
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: none;
      border-radius: 5px;
      width: 26px; height: 22px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      transition: background 0.15s;
    }
    .pane-btn:hover { background: rgba(0,0,0,0.8); }

    /* Fullscreen expand */
    .pane.expanded {
      position: fixed !important;
      inset: 0;
      z-index: 500;
      width: 100% !important;
      height: 100% !important;
    }

    webview {
      flex: 1;
      width: 100%;
      min-height: 0;
      border: none;
    }

    /* ── Gutters ── */
    .gutter { background: var(--gutter-bg); flex-shrink: 0; transition: background 0.15s; }
    .gutter.gutter-horizontal { cursor: col-resize; width: 3px !important; }
    .gutter.gutter-vertical   { cursor: row-resize; height: 3px !important; }
    .gutter:hover { background: var(--accent); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

  <!-- Toolbar -->
  <div class="toolbar">
    <span class="toolbar-brand">Promptly</span>
    <textarea id="globalPrompt" placeholder="Type a prompt and hit Send to All…"></textarea>
    <button id="sendBtn">Send to All</button>
    <button id="themeBtn" title="Toggle light / dark">🌙</button>
  </div>

  <!-- Image tray -->
  <div class="tray" id="imageTray">
    <div class="tray-dropzone" id="trayDropzone">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      Add images — then drag each into any panel
    </div>
  </div>
  <input type="file" id="imagePicker" style="display:none" accept="image/*" multiple />

  <!-- Webview grid (no headers) -->
  <div class="workspace" id="workspace">
    <div id="col1" class="wrapper-v">
      <div id="pane-chatgpt" class="pane">
        <span class="pane-label">ChatGPT</span>
        <div class="pane-actions">
          <button class="pane-btn refresh-btn" data-wv="wv-chatgpt" title="Refresh">↻</button>
          <button class="pane-btn expand-btn" data-pane="pane-chatgpt" title="Expand / Collapse">⤢</button>
        </div>
        <webview id="wv-chatgpt" src="https://chatgpt.com/" allowpopups partition="persist:chatgpt"></webview>
      </div>
      <div id="pane-claude" class="pane">
        <span class="pane-label">Claude</span>
        <div class="pane-actions">
          <button class="pane-btn refresh-btn" data-wv="wv-claude" title="Refresh">↻</button>
          <button class="pane-btn expand-btn" data-pane="pane-claude" title="Expand / Collapse">⤢</button>
        </div>
        <webview id="wv-claude" src="https://claude.ai/new" allowpopups partition="persist:claude"></webview>
      </div>
    </div>
    <div id="col2" class="wrapper-v">
      <div id="pane-gemini" class="pane">
        <span class="pane-label">Gemini</span>
        <div class="pane-actions">
          <button class="pane-btn refresh-btn" data-wv="wv-gemini" title="Refresh">↻</button>
          <button class="pane-btn expand-btn" data-pane="pane-gemini" title="Expand / Collapse">⤢</button>
        </div>
        <webview id="wv-gemini" src="https://gemini.google.com/app" allowpopups partition="persist:gemini"></webview>
      </div>
      <div id="pane-perplexity" class="pane">
        <span class="pane-label">Perplexity</span>
        <div class="pane-actions">
          <button class="pane-btn refresh-btn" data-wv="wv-perplexity" title="Refresh">↻</button>
          <button class="pane-btn expand-btn" data-pane="pane-perplexity" title="Expand / Collapse">⤢</button>
        </div>
        <webview id="wv-perplexity" src="https://www.perplexity.ai/" allowpopups partition="persist:perplexity"></webview>
      </div>
    </div>
  </div>

  <script src="./node_modules/split.js/dist/split.min.js"></script>
  <script>
    // ─── Split panes ───────────────────────────────────────────
    Split(['#col1', '#col2'], { sizes:[50,50], minSize:280, gutterSize:3, direction:'horizontal' });
    Split(['#pane-chatgpt','#pane-claude'],      { sizes:[50,50], minSize:100, gutterSize:3, direction:'vertical' });
    Split(['#pane-gemini','#pane-perplexity'],   { sizes:[50,50], minSize:100, gutterSize:3, direction:'vertical' });

    const { ipcRenderer } = require('electron');

    // ─── Theme toggle ──────────────────────────────────────────
    // Detect system preference
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
    let dark = prefersDark.matches;
    
    function applyTheme() {
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      document.getElementById('themeBtn').textContent = dark ? '🌙' : '☀️';
    }
    applyTheme();
    
    // Listen for system theme changes
    prefersDark.addEventListener('change', e => {
      dark = e.matches;
      applyTheme();
    });
    
    // Manual toggle
    document.getElementById('themeBtn').addEventListener('click', () => {
      dark = !dark;
      applyTheme();
    });

    // ─── Expand / collapse ─────────────────────────────────────
    let expandedPane = null;
    document.querySelectorAll('.expand-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const pane = document.getElementById(btn.dataset.pane);
        if (expandedPane === pane) {
          pane.classList.remove('expanded');
          btn.textContent = '⤢';
          expandedPane = null;
        } else {
          if (expandedPane) {
            expandedPane.classList.remove('expanded');
            expandedPane.querySelector('.expand-btn').textContent = '⤢';
          }
          pane.classList.add('expanded');
          btn.textContent = '✕';
          expandedPane = pane;
        }
      });
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && expandedPane) expandedPane.querySelector('.expand-btn').click();
    });

    // ─── Refresh buttons ───────────────────────────────────────
    document.querySelectorAll('.refresh-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const wv = document.getElementById(btn.dataset.wv);
        if (wv) wv.reload();
      });
    });

    // ─── Image tray ────────────────────────────────────────────
    const imageList = [];
    const tray = document.getElementById('imageTray');
    const dropzone = document.getElementById('trayDropzone');

    dropzone.addEventListener('click', () => document.getElementById('imagePicker').click());

    // Drag files FROM desktop INTO the tray dropzone
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
    dropzone.addEventListener('drop', async e => {
      e.preventDefault();
      dropzone.classList.remove('drag-over');
      for (const file of e.dataTransfer.files) {
        if (file.type.startsWith('image/')) await addImage(file);
      }
    });

    document.getElementById('imagePicker').addEventListener('change', async e => {
      for (const file of e.target.files) await addImage(file);
      e.target.value = '';
    });

    async function addImage(file) {
      const dataUrl = await convertToPng(file);
      const filePath = await ipcRenderer.invoke('save-temp-image', {
        dataUrl, name: file.name.replace(/\.[^.]+$/, '') + '.png'
      });
      imageList.push({ dataUrl, filePath, name: file.name });
      renderTray();
    }

    function convertToPng(file) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = ev => {
          const img = new Image();
          img.onload = () => {
            const c = document.createElement('canvas');
            c.width  = img.naturalWidth  || 1200;
            c.height = img.naturalHeight || 900;
            c.getContext('2d').drawImage(img, 0, 0);
            resolve(c.toDataURL('image/png'));
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function renderTray() {
      // Remove previous thumbs & separator, keep dropzone
      tray.querySelectorAll('.tray-thumb, .tray-sep').forEach(el => el.remove());

      imageList.forEach((item, idx) => {
        const wrap = document.createElement('div');
        wrap.className = 'tray-thumb';
        wrap.title = item.name + ' · drag into any AI panel';
        wrap.setAttribute('draggable', 'true');

        const imgEl = document.createElement('img');
        imgEl.src = item.dataUrl;
        wrap.appendChild(imgEl);

        const rm = document.createElement('button');
        rm.className = 'remove';
        rm.textContent = '×';
        rm.addEventListener('click', e => { e.stopPropagation(); imageList.splice(idx, 1); renderTray(); });
        wrap.appendChild(rm);

        wrap.addEventListener('dragstart', e => {
          e.preventDefault();
          ipcRenderer.send('start-drag', { filePath: item.filePath, dataUrl: item.dataUrl });
        });

        // Insert each thumb before the dropzone so images always appear to the left
        tray.insertBefore(wrap, dropzone);
      });

      // Separator between thumbs and dropzone, only when images exist
      if (imageList.length > 0) {
        const sep = document.createElement('div');
        sep.className = 'tray-sep';
        tray.insertBefore(sep, dropzone);
      }
    }

    // ─── Text injection ────────────────────────────────────────
    const makeTextCode = t => `(function(){
      const text=${t};
      function rs(el,v){try{const d=Object.getOwnPropertyDescriptor(Object.getPrototypeOf(el),'value');if(d&&d.set){d.set.call(el,v);el.dispatchEvent(new Event('input',{bubbles:true}));el.dispatchEvent(new Event('change',{bubbles:true}));return true;}}catch(e){}return false;}
      const sels=['#prompt-textarea','div.ProseMirror[contenteditable="true"]','rich-textarea div[contenteditable="true"]','div#ask-input[role="textbox"]','[role="textbox"]','textarea'];
      for(const s of sels){const el=document.querySelector(s);if(!el||el.offsetHeight===0||el.disabled)continue;el.focus();el.click();if(el.isContentEditable){document.execCommand('selectAll',false,null);document.execCommand('insertText',false,text);}else{el.select();if(!rs(el,text)){document.execCommand('selectAll',false,null);document.execCommand('insertText',false,text);}}return true;}return false;})()`;

    document.getElementById('sendBtn').addEventListener('click', async () => {
      const text = document.getElementById('globalPrompt').value.trim();
      if (!text) return;
      for (const wv of document.querySelectorAll('webview')) {
        try {
          await wv.executeJavaScript(makeTextCode(JSON.stringify(text)));
          await new Promise(r => setTimeout(r, 200));
        } catch(e) { console.error('inject failed', wv.id, e); }
      }
    });
  </script>
</body>
</html>
